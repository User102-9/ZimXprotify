<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <style>
        body { margin: 0; padding: 0; background: #0a0a0a; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .discord-btn { position: absolute; top: 20px; right: 20px; background: white; color: black; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-size: 0.8rem; z-index: 100; font-weight: bold; }
        .back-btn { display: none; position: absolute; top: 60px; left: 20px; background: transparent; border: 2px solid white; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; z-index: 100; }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; z-index: 2; width: 100%; }
        #home-screen { display: flex; }
        h1 { font-size: 3.5rem; letter-spacing: 5px; text-transform: uppercase; text-shadow: 0 0 20px rgba(255, 0, 0, 0.6); margin-bottom: 40px; }
        .btn-container { display: flex; gap: 40px; }
        .main-btn { padding: 18px 45px; font-size: 1.1rem; color: white; background: transparent; border: 2px solid #ff0000; border-radius: 50px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; cursor: pointer; }
        .main-btn:hover { background: #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }
        .input-box { background: #1a1a1a; border: 1px solid #ff0000; color: white; padding: 15px; width: 400px; border-radius: 8px; margin-top: 20px; outline: none; font-size: 1.1rem; }
        .selector-container { display: flex; gap: 20px; margin-top: 10px; }
        .option { background: #222; padding: 10px 20px; border-radius: 5px; cursor: pointer; border: 1px solid #444; }
        .option.active { border-color: #ff0000; background: #331111; }
        #result-container { margin-top: 20px; padding: 15px; background: #111; border: 1px dashed #ff0000; border-radius: 8px; display: none; font-family: 'Courier New', monospace; word-break: break-all; width: 450px; text-align: center; cursor: pointer; }
        .glow-active { box-shadow: 0 0 25px #ff0000; border-style: solid !important; color: #ff0000 !important; }
        .star { position: absolute; color: #ff0000; pointer-events: none; z-index: 1; font-size: 10px; animation: fall linear forwards; }
        @keyframes fall { from { transform: translateY(-50px); } to { transform: translateY(110vh); } }
    </style>
</head>
<body>
    <a href="https://discord.com" class="discord-btn" target="_blank">OUR DISCORD</a>
    <button class="back-btn" id="backBtn" onclick="goHome()">← BACK</button>

    <div id="home-screen" class="screen">
        <h1>BEAM ZERO</h1>
        <div class="btn-container">
            <div class="main-btn" onclick="showScreen('gen-screen')">Generators</div>
            <div class="main-btn" onclick="showScreen('link-screen')">Hyperlink</div>
            <div class="main-btn" onclick="showScreen('q-screen')">Questions</div>
        </div>
    </div>

    <div id="link-screen" class="screen">
        <h1>HYPERLINK</h1>
        <div class="selector-container">
            <div class="option" onclick="selectType(this)">Profile</div>
            <div class="option" onclick="selectType(this)">Private Server</div>
        </div>
        <input type="text" id="linkInput" class="input-box" placeholder="Paste link (https://...)">
        <button class="main-btn" id="shortBtn" style="margin-top: 20px; padding: 10px 40px;" onclick="processShorten()">Shorten</button>
        <div id="result-container" onclick="copyToClipboard()"></div>
        <p id="copy-status" style="font-size: 0.7rem; color: #888; margin-top: 5px; display: none;">Click to copy!</p>
    </div>

    <div id="gen-screen" class="screen"><h1>GENERATORS</h1></div>
    <div id="q-screen" class="screen"><h1>QUESTIONS</h1></div>

    <script>
        let selectedType = "";
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = 'flex'; document.getElementById('backBtn').style.display = 'block'; }
        function goHome() { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); document.getElementById('home-screen').style.display = 'flex'; document.getElementById('backBtn').style.display = 'none'; }
        function selectType(el) { document.querySelectorAll('.option').forEach(o => o.classList.remove('active')); el.classList.add('active'); selectedType = el.innerText; }

        async function processShorten() {
            const urlInput = document.getElementById('linkInput').value.trim();
            const res = document.getElementById('result-container');
            const btn = document.getElementById('shortBtn');
            if (!urlInput.startsWith('http')) return alert("Use a valid link starting with http/https");

            res.style.display = 'block';
            res.innerText = "Processing...";
            btn.disabled = true;

            try {
                // Calls your private API
                const response = await fetch(`/api/shorten?url=${encodeURIComponent(urlInput)}`);
                const data = await response.text();
                if (data.includes("https://is.gd")) {
                    res.innerText = data;
                    res.classList.add('glow-active');
                    document.getElementById('copy-status').style.display = "block";
                } else { res.innerText = "Error: Invalid link."; }
            } catch (e) { res.innerText = "Server Error."; } finally { btn.disabled = false; }
        }

        function copyToClipboard() {
            const text = document.getElementById('result-container').innerText;
            if (text.startsWith("http")) {
                navigator.clipboard.writeText(text);
                document.getElementById('copy-status').innerText = "COPIED!";
                setTimeout(() => document.getElementById('copy-status').innerText = "Click to copy!", 2000);
            }
        }

        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 5000);
        }
        setInterval(createStar, 400);
    </script>
</body>
</html>
