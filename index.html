<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* Discord button stays visible on all screens */
        .discord-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: white;
            color: black;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.8rem;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* Back Button - Hidden by default */
        .back-btn {
            display: none; /* Shown only in dashboard */
            position: absolute;
            top: 60px; /* Slightly down from top */
            left: 20px;
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: white;
            color: black;
        }

        /* Main Home Screen Layout */
        #home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            z-index: 2;
        }

        /* Dashboard Screen Layout - Hidden by default */
        #dashboard-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
            z-index: 2;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            margin-bottom: 40px;
        }

        .btn-container {
            display: flex;
            gap: 40px; /* More space between them */
        }

        .main-btn {
            padding: 18px 45px;
            font-size: 1.1rem;
            color: white;
            background: transparent;
            border: 2px solid #ff0000;
            border-radius: 50px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .main-btn:hover {
            background-color: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
            transform: scale(1.05);
        }

        .dashboard-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 0, 0, 0.3); }
            50% { box-shadow: 0 0 25px rgba(255, 0, 0, 0.6); }
        }

        /* Falling Stars */
        .star {
            position: absolute;
            top: -50px;
            color: #ff0000;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }
    </style>
</head>
<body>

    <!-- Persistent Discord Link -->
    <a href="https://discord.gg" class="discord-btn" target="_blank">
        <i class="fab fa-discord"></i> OUR DISCORD
    </a>

    <!-- Back Button (for Dashboard) -->
    <button class="back-btn" id="backBtn" onclick="goHome()">← BACK</button>

    <!-- HOME VIEW -->
    <div id="home-screen">
        <h1>BEAM ZERO</h1>
        <div class="btn-container">
            <div class="main-btn dashboard-pulse" onclick="showDashboard()">Main Dashboard</div>
            <div class="main-btn">Hyperlink</div>
            <div class="main-btn">Questions</div>
        </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-screen">
        <h1>MAIN DASHBOARD</h1>
        <!-- Add your dashboard content here! -->
        <p style="color: #666;">Welcome to the control center.</p>
    </div>

    <script>
        function showDashboard() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'flex';
            document.getElementById('backBtn').style.display = 'block';
        }

        function goHome() {
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('dashboard-screen').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
        }

        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            star.innerHTML = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 4 + 6) + 's';
            star.style.opacity = Math.random();
            star.style.fontSize = (Math.random() * 15 + 10) + 'px';
            document.body.appendChild(star);
            setTimeout(() => { star.remove(); }, 10000);
        }
        setInterval(createStar, 300);
    </script>
</body>
</html>
