<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* Persistent Discord Button */
        .discord-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: white;
            color: black;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.8rem;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* Back Button */
        .back-btn {
            display: none;
            position: absolute;
            top: 60px;
            left: 20px;
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        #home-screen, #gen-screen, #link-screen, #q-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            z-index: 2;
            width: 100%;
        }

        #gen-screen, #link-screen, #q-screen { display: none; margin-top: 40px; }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            margin-bottom: 20px;
        }

        .btn-container { display: flex; gap: 40px; }

        .main-btn {
            padding: 18px 45px;
            font-size: 1.1rem;
            color: white;
            background: transparent;
            border: 2px solid #ff0000;
            border-radius: 50px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
        }

        .main-btn:hover {
            background-color: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
        }

        /* Input & Questions Styling */
        .input-box {
            background: #1a1a1a;
            border: 1px solid #ff0000;
            color: white;
            padding: 15px;
            width: 400px;
            border-radius: 8px;
            margin-top: 10px;
            font-family: sans-serif;
            outline: none;
        }

        #questions-container {
            margin-top: 20px;
            width: 430px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid #ff0000;
        }

        .q-entry {
            background: #222;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 0.9rem;
            word-wrap: break-word;
        }

        .selector-container { display: flex; gap: 20px; margin-top: 10px; }
        .option { background: #222; padding: 10px 20px; border-radius: 5px; cursor: pointer; border: 1px solid #444; }
        .option.active { border-color: #ff0000; background: #331111; }

        .star { position: absolute; top: -50px; color: #ff0000; user-select: none; pointer-events: none; z-index: 1; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <a href="https://discord.gg" class="discord-btn" target="_blank">
        <i class="fab fa-discord"></i> OUR DISCORD
    </a>

    <button class="back-btn" id="backBtn" onclick="goHome()">← BACK</button>

    <!-- HOME VIEW -->
    <div id="home-screen">
        <h1>BEAM ZERO</h1>
        <div class="btn-container">
            <div class="main-btn" onclick="showScreen('gen-screen')">Generators</div>
            <div class="main-btn" onclick="showScreen('link-screen')">Hyperlink</div>
            <div class="main-btn" onclick="showScreen('q-screen')">Questions</div>
        </div>
    </div>

    <!-- GENERATORS VIEW -->
    <div id="gen-screen">
        <h1>GENERATORS</h1>
        <p>Select a generator to begin.</p>
    </div>

    <!-- HYPERLINK VIEW -->
    <div id="link-screen">
        <h1>HYPERLINK</h1>
        <div class="selector-container">
            <div class="option" onclick="selectType(this)">Profile</div>
            <div class="option" onclick="selectType(this)">Private Server</div>
        </div>
        <input type="text" class="input-box" placeholder="Paste your link here...">
        <div class="main-btn" style="margin-top:20px; padding: 10px 30px;">Generate</div>
    </div>

    <!-- QUESTIONS VIEW -->
    <div id="q-screen">
        <h1>QUESTIONS</h1>
        <textarea id="qInput" class="input-box" placeholder="Type your question or message here..." rows="3"></textarea>
        <div class="main-btn" style="margin-top:15px; padding: 10px 30px;" onclick="postQuestion()">Send to All</div>
        
        <div id="questions-container">
            <div class="q-entry">Welcome to the public feed! Type something above.</div>
        </div>
    </div>

    <script>
        function showScreen(screenId) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('gen-screen').style.display = 'none';
            document.getElementById('link-screen').style.display = 'none';
            document.getElementById('q-screen').style.display = 'none';
            
            document.getElementById(screenId).style.display = 'flex';
            document.getElementById('backBtn').style.display = 'block';
        }

        function goHome() {
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('gen-screen').style.display = 'none';
            document.getElementById('link-screen').style.display = 'none';
            document.getElementById('q-screen').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
        }

        function postQuestion() {
            const input = document.getElementById('qInput');
            const container = document.getElementById('questions-container');
            if(input.value.trim() !== "") {
                const newQ = document.createElement('div');
                newQ.classList.add('q-entry');
                newQ.innerText = input.value;
                container.prepend(newQ); // Puts newest at the top
                input.value = "";
            }
        }

        function selectType(element) {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
        }

        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            star.innerHTML = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 4 + 6) + 's';
            star.style.opacity = Math.random();
            star.style.fontSize = (Math.random() * 15 + 10) + 'px';
            document.body.appendChild(star);
            setTimeout(() => { star.remove(); }, 10000);
        }
        setInterval(createStar, 300);
    </script>
</body>
</html>
