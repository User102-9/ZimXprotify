<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .discord-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: white;
            color: black;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.8rem;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .discord-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            background-color: #f0f0f0;
        }

        .discord-btn i {
            font-size: 1.2rem;
            color: #5865F2;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 60px;
            margin-bottom: 20px; /* Space between title and dashboard button */
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            z-index: 2;
        }

        /* Main Dashboard Button Styling */
        .dashboard-btn {
            z-index: 2;
            padding: 15px 40px;
            font-size: 1rem;
            color: white;
            background: transparent;
            border: 2px solid #ff0000;
            border-radius: 50px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }

        .dashboard-btn:hover {
            background-color: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
            transform: scale(1.05);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(255, 0, 0, 0.3); }
            50% { box-shadow: 0 0 25px rgba(255, 0, 0, 0.6); }
            100% { box-shadow: 0 0 10px rgba(255, 0, 0, 0.3); }
        }

        .star {
            position: absolute;
            top: -50px;
            color: #ff0000;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }
    </style>
</head>
<body>

    <a href="https://discord.gg" class="discord-btn" target="_blank">
        <i class="fab fa-discord"></i> OUR DISCORD
    </a>

    <h1>BEAM ZERO</h1>

    <!-- New Main Dashboard Button -->
    <a href="#" class="dashboard-btn">Main Dashboard</a>

    <script>
        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            star.innerHTML = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 4 + 6) + 's';
            star.style.opacity = Math.random();
            star.style.fontSize = (Math.random() * 15 + 10) + 'px';
            document.body.appendChild(star);
            setTimeout(() => { star.remove(); }, 10000);
        }
        setInterval(createStar, 300);
    </script>
</body>
</html>
