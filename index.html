<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <!-- Font Awesome for Discord Icon -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            margin: 0; padding: 0; background-color: #0a0a0a; color: white;
            font-family: 'Arial Black', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }

        /* Persistent UI */
        .discord-btn {
            position: absolute; top: 20px; right: 20px; background-color: white; color: black;
            text-decoration: none; padding: 12px 24px; border-radius: 8px; font-size: 0.8rem;
            z-index: 100; display: flex; align-items: center; gap: 10px; font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        .back-btn {
            display: none; position: absolute; top: 60px; left: 20px;
            background: transparent; border: 2px solid white; color: white;
            padding: 10px 20px; border-radius: 5px; cursor: pointer; z-index: 100;
            text-transform: uppercase; font-size: 0.8rem; transition: 0.3s;
        }
        .back-btn:hover { background: white; color: black; }

        /* Screen Layouts */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; z-index: 2; width: 100%; }
        #home-screen { display: flex; }

        h1 {
            font-size: 3.5rem; letter-spacing: 5px; text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6); margin-bottom: 40px;
        }

        .btn-container { display: flex; gap: 40px; }
        .main-btn {
            padding: 18px 45px; font-size: 1.1rem; color: white; background: transparent;
            border: 2px solid #ff0000; border-radius: 50px; text-decoration: none;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; cursor: pointer;
        }
        .main-btn:hover { background-color: #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }

        /* Input Styling */
        .input-box {
            background: #1a1a1a; border: 1px solid #ff0000; color: white;
            padding: 15px; width: 400px; border-radius: 8px; margin-top: 20px;
            font-family: Arial; outline: none; font-size: 1.1rem;
        }
        .selector-container { display: flex; gap: 20px; margin-top: 10px; }
        .option { background: #222; padding: 10px 20px; border-radius: 5px; cursor: pointer; border: 1px solid #444; }
        .option.active { border-color: #ff0000; background: #331111; }
        
        #result-container {
            margin-top: 20px; padding: 15px; background: #111; border: 1px dashed #ff0000;
            border-radius: 8px; display: none; font-family: 'Courier New', monospace;
            word-break: break-all; width: 450px; text-align: center; cursor: pointer;
        }
        #result-container:hover { background: #1a1a1a; }

        /* Chat Room */
        #chat-interface { display: none; flex-direction: column; width: 80%; max-width: 600px; height: 60vh; }
        #questions-container {
            flex-grow: 1; background: rgba(255, 255, 255, 0.05); padding: 20px;
            border-radius: 8px 8px 0 0; border-left: 3px solid #ff0000; overflow-y: auto;
            margin-bottom: 5px; font-family: Arial;
        }
        .q-entry { background: #222; padding: 12px; margin-bottom: 10px; border-radius: 4px; }
        .q-entry b { color: #ff0000; margin-right: 10px; text-transform: uppercase; font-size: 0.8rem; }

        /* Star Background Animation */
        .star { 
            position: absolute; color: #ff0000; pointer-events: none; z-index: 1; 
            font-size: 10px; opacity: 0.8;
            animation: fall linear forwards; 
        }
        @keyframes fall { 
            from { transform: translateY(-50px); }
            to { transform: translateY(110vh); } 
        }
    </style>
</head>
<body>

    <a href="https://discord.gg" class="discord-btn" target="_blank">
        OUR DISCORD
    </a>

    <button class="back-btn" id="backBtn" onclick="goHome()">← BACK</button>

    <!-- HOME VIEW -->
    <div id="home-screen" class="screen">
        <h1>BEAM ZERO</h1>
        <div class="btn-container">
            <div class="main-btn" onclick="showScreen('gen-screen')">Generators</div>
            <div class="main-btn" onclick="showScreen('link-screen')">Hyperlink</div>
            <div class="main-btn" onclick="showScreen('q-screen')">Questions</div>
        </div>
    </div>

    <!-- GENERATORS VIEW -->
    <div id="gen-screen" class="screen"><h1>GENERATORS</h1><p>Tooling and services.</p></div>

    <!-- HYPERLINK VIEW -->
    <div id="link-screen" class="screen">
        <h1>HYPERLINK</h1>
        <div class="selector-container">
            <div class="option" onclick="selectType(this)">Profile</div>
            <div class="option" onclick="selectType(this)">Private Server</div>
        </div>
        <input type="text" id="linkInput" class="input-box" placeholder="Paste your link here..." oninput="instantShorten()">
        <div id="result-container" onclick="copyToClipboard()"></div>
        <p id="copy-status" style="font-size: 0.7rem; color: #888; margin-top: 5px; display: none;">Click box to copy link!</p>
    </div>

    <!-- QUESTIONS VIEW -->
    <div id="q-screen" class="screen">
        <h1>QUESTIONS</h1>
        <div id="user-setup" style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
            <input type="text" id="usernameInput" class="input-box" placeholder="Enter a username..." style="width:300px;">
            <div class="main-btn" onclick="setUsername()" style="padding: 10px 30px;">Enter Chat</div>
        </div>
        <div id="chat-interface">
            <div id="questions-container"><div class="q-entry"><b>SYSTEM</b> Welcome to the public feed!</div></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="qInput" class="input-box" placeholder="Type message..." style="padding:15px;">
                <div class="main-btn" style="padding: 10px 30px;" onclick="postQuestion()">Send</div>
            </div>
        </div>
    </div>

    <script>
        let currentUsername = "";
        let selectedType = "";

        // UI NAVIGATION
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            document.getElementById('backBtn').style.display = 'block';
            if(id === 'q-screen' && !currentUsername) {
                document.getElementById('user-setup').style.display = 'flex';
                document.getElementById('chat-interface').style.display = 'none';
            }
        }

        function goHome() {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('backBtn').style.display = 'none';
        }

        // HYPERLINK LOGIC
        function selectType(el) {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            selectedType = el.innerText;
            instantShorten();
        }

        async function instantShorten() {
            const urlInput = document.getElementById('linkInput').value.trim();
            const res = document.getElementById('result-container');
            const status = document.getElementById('copy-status');
            
            if (urlInput.startsWith('http') && selectedType !== "") {
                res.style.display = 'block';
                res.innerText = "Shortening instantly...";
                res.style.color = "white";

                try {
                    // API implementation using is.gd with a CORS proxy
                    const target = `https://is.gd{encodeURIComponent(urlInput)}`;
                    const response = await fetch(`https://corsproxy.io{encodeURIComponent(target)}`);
                    const shortUrl = await response.text();

                    if (shortUrl.includes("https://is.gd")) {
                        res.innerText = shortUrl;
                        res.style.color = "#ff0000";
                        status.style.display = "block";
                    } else {
                        res.innerText = "Error: Use a valid URL";
                    }
                } catch (e) {
                    res.innerText = "Connection failed.";
                }
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('result-container').innerText;
            if (text.includes("is.gd")) {
                navigator.clipboard.writeText(text);
                const status = document.getElementById('copy-status');
                status.innerText = "COPIED TO CLIPBOARD!";
                setTimeout(() => status.innerText = "Click box to copy link!", 2000);
            }
        }

        // CHAT LOGIC
        function setUsername() {
            const name = document.getElementById('usernameInput').value.trim();
            if(name.length > 2) {
                currentUsername = name;
                document.getElementById('user-setup').style.display = 'none';
                document.getElementById('chat-interface').style.display = 'flex';
            }
        }

        function postQuestion() {
            const msg = document.getElementById('qInput').value.trim();
            if(msg !== "") {
                const container = document.getElementById('questions-container');
                const entry = document.createElement('div');
                entry.className = 'q-entry';
                entry.innerHTML = `<b>${currentUsername}</b> ${msg}`;
                container.appendChild(entry);
                container.scrollTop = container.scrollHeight;
                document.getElementById('qInput').value = "";
            }
        }

        // STAR ANIMATION
        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 5000);
        }
        setInterval(createStar, 300);

    </script>
</body>
</html>
