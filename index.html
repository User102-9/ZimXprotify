<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <!-- Link to Font Awesome for the Discord Icon -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Discord Button Styling */
        .discord-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: white;
            color: black;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px; /* Space between icon and text */
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            border: none;
            cursor: pointer;
        }

        .discord-btn:hover {
            background-color: #f0f0f0;
            transform: scale(1.05);
        }

        .discord-btn i {
            font-size: 1.2rem;
            color: #5865F2; /* Official Discord Blurple for the icon */
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 40px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            z-index: 2;
        }

        .star {
            position: absolute;
            top: -50px;
            color: #ff0000;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh);
            }
        }
    </style>
</head>
<body>

    <!-- REPLACE 'PASTE_YOUR_LINK_HERE' with your actual discord.gg link -->
    <a href="PASTE_YOUR_LINK_HERE" class="discord-btn" target="_blank">
        <i class="fab fa-discord"></i> OUR DISCORD
    </a>

    <h1>BEAM ZERO</h1>

    <script>
        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            star.innerHTML = '★';
            
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 4 + 6) + 's';
            star.style.opacity = Math.random();
            star.style.fontSize = (Math.random() * 15 + 10) + 'px';
            
            document.body.appendChild(star);

            setTimeout(() => {
                star.remove();
            }, 10000);
        }

        setInterval(createStar, 300);
    </script>
</body>
</html>
