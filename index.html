<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; /* Dark background */
            color: white;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden; /* Stops scrolling */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* The Big Name Style */
        h1 {
            font-size: 6rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
            z-index: 2; /* Keeps text in front of stars */
        }

        /* Star Styling */
        .star {
            position: absolute;
            top: -50px;
            color: #ff0000; /* Red stars */
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        /* Animation for falling */
        @keyframes fall {
            to {
                transform: translateY(110vh);
            }
        }
    </style>
</head>
<body>

    <h1>BEAM ZERO</h1>

    <script>
        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            star.innerHTML = '★';
            
            // Randomize position and speed
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 4 + 6) + 's'; // 6-10 seconds for slow fall
            star.style.opacity = Math.random();
            star.style.fontSize = (Math.random() * 20 + 10) + 'px';
            
            document.body.appendChild(star);

            // Clean up stars after they fall
            setTimeout(() => {
                star.remove();
            }, 10000);
        }

        // Add a new star every 300 milliseconds
        setInterval(createStar, 300);
    </script>
</body>
</html>
