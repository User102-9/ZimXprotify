<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamZero</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .discord-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: white;
            color: black;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.8rem;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .back-btn {
            display: none;
            position: absolute;
            top: 60px;
            left: 20px;
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; z-index: 2; width: 100%; }
        #home-screen { display: flex; }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            margin-bottom: 20px;
        }

        .btn-container { display: flex; gap: 40px; }
        .main-btn {
            padding: 18px 45px;
            font-size: 1.1rem;
            color: white;
            background: transparent;
            border: 2px solid #ff0000;
            border-radius: 50px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            cursor: pointer;
        }

        .main-btn:hover { background-color: #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }

        .input-box {
            background: #1a1a1a;
            border: 1px solid #ff0000;
            color: white;
            padding: 20px;
            width: 400px;
            border-radius: 8px;
            font-family: Arial;
            outline: none;
            font-size: 1.1rem;
            margin-top: 20px;
        }

        .selector-container { display: flex; gap: 20px; margin-top: 10px; }
        .option { background: #222; padding: 10px 20px; border-radius: 5px; cursor: pointer; border: 1px solid #444; }
        .option.active { border-color: #ff0000; background: #331111; }

        #result-container {
            margin-top: 20px;
            padding: 15px;
            background: #111;
            border: 1px dashed #ff0000;
            border-radius: 8px;
            display: none;
            font-family: 'Courier New', Courier, monospace;
            word-break: break-all;
            width: 80%;
            max-width: 500px;
            text-align: center;
            color: #00ff00; /* Green text for the link result */
        }

        /* Chat UI Styling */
        #chat-interface { display: none; flex-direction: column; width: 80%; max-width: 600px; height: 60vh; }
        #questions-container { flex-grow: 1; background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 8px 8px 0 0; border-left: 3px solid #ff0000; overflow-y: auto; margin-bottom: 5px; }
        .q-entry { background: #222; padding: 12px; margin-bottom: 10px; border-radius: 4px; font-family: 'Arial', sans-serif; }
        .q-entry b { color: #ff0000; margin-right: 10px; text-transform: uppercase; font-size: 0.8rem; }
        .chat-input-area { display: flex; gap: 10px; width: 100%; }

        .star { position: absolute; top: -50px; color: #ff0000; user-select: none; pointer-events: none; z-index: 1; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <a href="https://discord.gg" class="discord-btn" target="_blank">
        <i class="fab fa-discord"></i> OUR DISCORD
    </a>

    <button class="back-btn" id="backBtn" onclick="goHome()">← BACK</button>

    <div id="home-screen" class="screen">
        <h1>BEAM ZERO</h1>
        <div class="btn-container">
            <div class="main-btn" onclick="showScreen('gen-screen')">Generators</div>
            <div class="main-btn" onclick="showScreen('link-screen')">Hyperlink</div>
            <div class="main-btn" onclick="showScreen('q-screen')">Questions</div>
        </div>
    </div>

    <div id="gen-screen" class="screen"><h1>GENERATORS</h1></div>

    <!-- HYPERLINK VIEW -->
    <div id="link-screen" class="screen">
        <h1>HYPERLINK</h1>
        <div class="selector-container">
            <div class="option" id="optProfile" onclick="selectType(this)">Profile</div>
            <div class="option" onclick="selectType(this)">Private Server</div>
        </div>
        <input type="text" id="linkInput" class="input-box" placeholder="Paste your link here...">
        <div class="main-btn" id="genBtn" style="margin-top:20px; padding: 10px 30px;" onclick="generateLink()">Generate</div>
        
        <div id="result-container">Shortening link...</div>
    </div>

    <!-- QUESTIONS VIEW -->
    <div id="q-screen" class="screen">
        <h1>QUESTIONS</h1>
        <div id="user-setup" style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
            <input type="text" id="usernameInput" class="input-box" placeholder="Enter a username..." style="width:300px;">
            <div class="main-btn" onclick="setUsername()" style="padding: 10px 30px;">Enter Chat</div>
        </div>
        <div id="chat-interface">
            <div id="questions-container"><div class="q-entry"><b>SYSTEM</b> Welcome to the public feed!</div></div>
            <div class="chat-input-area">
                <input type="text" id="qInput" class="input-box" placeholder="Type your message here...">
                <div class="main-btn" style="padding: 10px 30px;" onclick="postQuestion()">Send</div>
            </div>
        </div>
    </div>

    <script>
        let currentUsername = "";
        let selectedType = "";

        function selectType(element) {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
            selectedType = element.innerText;
            document.getElementById('result-container').style.display = 'none';
        }

        async function generateLink() {
            const input = document.getElementById('linkInput').value.trim();
            const resultBox = document.getElementById('result-container');
            const genBtn = document.getElementById('genBtn');

            if (selectedType === "Profile" && input !== "") {
                genBtn.innerText = "Processing...";
                resultBox.style.display = 'block';
                resultBox.innerText = "Shortening your link...";

                try {
                    // Using TinyURL API to actually shorten the link
                    const response = await fetch(`https://tinyurl.com{encodeURIComponent(input)}`);
                    if (response.ok) {
                        const shortLink = await response.text();
                        resultBox.innerText = `[https://roblox.com](${shortLink})`;
                    } else {
                        resultBox.innerText = "Error shortening link. Please try again.";
                    }
                } catch (error) {
                    resultBox.innerText = "Network error. Link shortening failed.";
                }
                genBtn.innerText = "Generate";
            } else if (input === "") {
                alert("Please paste a link first!");
            } else {
                alert("Select 'Profile' to use this format.");
            }
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(screenId).style.display = 'flex';
            document.getElementById('backBtn').style.display = 'block';
            if(screenId === 'q-screen' && currentUsername === "") {
                document.getElementById('user-setup').style.display = 'flex';
                document.getElementById('chat-interface').style.display = 'none';
            }
        }

        function goHome() {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('backBtn').style.display = 'none';
        }

        function setUsername() {
            const name = document.getElementById('usernameInput').value.trim();
            if(name !== "") {
                currentUsername = name;
                document.getElementById('user-setup').style.display = 'none';
                document.getElementById('chat-interface').style.display = 'flex';
            }
        }

        function postQuestion() {
            const input = document.getElementById('qInput');
            const container = document.getElementById('questions-container');
            if(input.value.trim() !== "") {
                const newQ = document.createElement('div');
                newQ.classList.add('q-entry');
                newQ.innerHTML = `<b>${currentUsername}</b> ${input.value}`;
                container.appendChild(newQ); 
                input.value = "";
                container.scrollTop = container.scrollHeight;
            }
        }

        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            star.innerHTML = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = (Math.random() * 4 + 6) + 's';
            star.style.opacity = Math.random();
            star.style.fontSize = (Math.random() * 15 + 10) + 'px';
            document.body.appendChild(star);
            setTimeout(() => { star.remove(); }, 10000);
        }
        setInterval(createStar, 300);
    </script>
</body>
</html>
